# Tenrary-X TurboQuant Experiment Configuration
# Bonsai-8B Q1_0 with TurboQuant KV cache compression
# Architecture: Qwen3-8B dense (36 layers, 32 query / 8 KV heads)

model:
  path: ""                  # auto-discover first *.gguf in models/
  name: "Bonsai-8B-Q1_0"
  architecture: "qwen3-8b"
  layers: 36
  n_ctx: 8192               # start same as baseline
  n_gpu_layers: 99
  n_threads: 8
  n_batch: 512
  chat_format: "chatml"

# Generation parameters (from Bonsai best practices)
generation:
  temperature: 0.5
  top_k: 20
  top_p: 0.85

kv_cache:
  cache_type_k: "q8_0"     # keep keys at Q8
  cache_type_v: "q4_0"     # compress values to Q4 (turbo4 equivalent)
  flash_attention: true

turboquant:
  preset: "quality"         # quality (K8/V4) | aggressive (K8/V2) | symmetric (K4/V4)
  block_size: 128

# Extended context lengths for TQ scaling test
benchmark:
  context_lengths: [2048, 4096, 8192, 16384]
  warmup_runs: 2
  measure_runs: 5
  max_gen_tokens: 128

# Experiment variants to test
experiments:
  kv_scaling:
    description: "KV Cache Scaling — compare VRAM at different context lengths"
    configs:
      - name: "baseline_q8"
        cache_type_k: "q8_0"
        cache_type_v: "q8_0"
      - name: "tq_quality"
        cache_type_k: "q8_0"
        cache_type_v: "q4_0"
      - name: "tq_aggressive"
        cache_type_k: "q8_0"
        cache_type_v: "q4_0"
        preset: "aggressive"

  hybrid_kv:
    description: "Hybrid KV — normal KV for early tokens, TQ for long context"
    enabled: false          # enable after baseline experiments
    switch_threshold: 4096  # context length where we switch to TQ
