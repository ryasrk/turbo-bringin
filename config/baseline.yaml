# Tenrary-X Baseline Configuration
# Bonsai-8B Q1_0 on PrismML llama.cpp (standard mode)
# Architecture: Qwen3-8B dense (36 layers, 32 query / 8 KV heads, SwiGLU, RoPE)
# Model size: 1.16 GB GGUF (fits entirely in 8GB VRAM)

model:
  path: ""                  # auto-discover first *.gguf in models/
  name: "Bonsai-8B-Q1_0"
  architecture: "qwen3-8b"
  layers: 36
  n_ctx: 8192               # safe context length for baseline
  n_gpu_layers: 99          # offload all layers to GPU (model is only 1.16 GB)
  n_threads: 8              # CPU threads for non-GPU work
  n_batch: 512              # prompt eval batch size
  chat_format: "chatml"

# Generation parameters (from Bonsai best practices)
generation:
  temperature: 0.5
  top_k: 20
  top_p: 0.85

kv_cache:
  cache_type_k: "q8_0"     # standard Q8 keys
  cache_type_v: "q8_0"     # standard Q8 values
  flash_attention: true

# Context lengths to benchmark
benchmark:
  context_lengths: [2048, 4096, 8192]
  warmup_runs: 2
  measure_runs: 5
  max_gen_tokens: 128
